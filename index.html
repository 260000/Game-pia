// ═══ CORE FIX: ATOMIC STOP ═══════════════════
// DONE flag = only ONE call ever completes. Eliminates freeze.
function StopGame(win){
  if(DONE)return;         // ← FREEZE FIX: block any re-entry
  DONE=true;              // ← set FIRST, before anything else
  RUN=false;
  CAF(FID);CAF(FID);FID=0; // ← double-cancel for safety
  if(TTMR){clearInterval(TTMR);TTMR=null;}
  AmbStop();
  TRY(function(){if(navigator.vibrate)navigator.vibrate(win?[40,20,80,20,120]:[80,40,180]);});
  if(SC>G.best)G.best=SC;
  if(win){
    var lv=LVS[CL-1];
    var earned=lv.mo+(lv.spb||0);
    G.money+=earned;if(lv.gld)G.gold=(G.gold||0)+lv.gld;
    if(G.clv.indexOf(CL)<0)G.clv.push(CL);
    if(CL>=G.ulv)G.ulv=Math.min(50,CL+1);
    UpdLB(SC);SAV();ShowWin(lv,earned);
  }else{UpdLB(SC);SAV();ShowOver();}
}

function InitGame(){
  var lv=LVS[CL-1];
  GenDeco();
  SNK=[{x:W/2,y:H/2}];
  for(var i=1;i<12;i++)SNK.push({x:W/2,y:H/2+i*(BR*1.2)});
  DIR=-Math.PI/2;TDIR=DIR;
  FRTS=[];PTS=[];SC=0;FE=0;BENG=1;PAU=false;PDN=false;
  DONE=false; // ← reset for new game
  TLEFT=lv.sec;
  for(var j=0;j<lv.sn;j++)FRTS.push(SpawnFr());
  var hs=document.getElementById('hS');if(hs)hs.textContent='0';
  var ht=document.getElementById('hT');if(ht)ht.textContent=TLEFT;
  var hl=document.getElementById('hL');if(hl)hl.textContent=CL;
  var hi=document.getElementById('hI');if(hi)hi.textContent=lv.th.i;
  var htp=document.getElementById('hTpill');if(htp)htp.classList.remove('TW');
  if(TTMR){clearInterval(TTMR);TTMR=null;}
  TTMR=setInterval(function(){
    if(PAU||!RUN||DONE)return;
    TLEFT--;
    var tv=document.getElementById('hT');if(tv)tv.textContent=TLEFT;
    if(TLEFT<=10){var tp=document.getElementById('hTpill');if(tp)tp.classList.add('TW');}
    if(TLEFT<=0){clearInterval(TTMR);TTMR=null;if(!DONE)StopGame(false);}
  },1000);
}

function Loop(ts){
  if(!RUN||DONE){FID=0;return;}
  FID=RAF(Loop);
  if(!X)return;
  if(PAU){X.clearRect(0,0,W,H);DrawBg(ts);DrawSnake(ts);DrawPts();return;}
  var ch=CHARS[CC],lv=LVS[CL-1];
  if(PDN&&BENG>0){if(!BOOST){BOOST=true;SndBst();}BENG=Math.max(0,BENG-0.008);if(BENG===0)BOOST=false;}
  else{BOOST=false;BENG=Math.min(1,BENG+0.003);}
  var spd=BOOST?ch.bs:ch.sp;
  var diff=TDIR-DIR;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
  DIR+=Math.max(-ch.tr,Math.min(ch.tr,diff));
  var nh={x:SNK[0].x+Math.cos(DIR)*spd,y:SNK[0].y+Math.sin(DIR)*spd};
  if(nh.x<0)nh.x=W;if(nh.x>W)nh.x=0;if(nh.y<0)nh.y=H;if(nh.y>H)nh.y=0;
  SNK.unshift(nh);SNK.pop();
  for(var i=lv.gr;i<SNK.length;i++){var s=SNK[i],dx=nh.x-s.x,dy=nh.y-s.y;if(dx*dx+dy*dy<BR*BR*0.76){StopGame(false);return;}}
  for(var fi=FRTS.length-1;fi>=0;fi--){
    var f=FRTS[fi],fdx=nh.x-f.x,fdy=nh.y-f.y;
    if(fdx*fdx+fdy*fdy<(BR+20)*(BR+20)){
      Kriuk(ch.sn);TRY(function(){if(navigator.vibrate)navigator.vibrate([22,8,15]);});
      SpawnPts(f.x,f.y,f.t.c);
      var pts=f.t.p*(BOOST?2:1);SC+=pts;G.coins+=pts;FE++;
      var hs=document.getElementById('hS');if(hs)hs.textContent=SC;
      var tail=SNK[SNK.length-1];for(var g=0;g<f.t.p*4+4;g++)SNK.push({x:tail.x,y:tail.y});
      FRTS.splice(fi,1);FRTS.push(SpawnFr());
      if(FE>=lv.ft){StopGame(true);return;}  // ← return immediately after StopGame
    }
  }
  UpdPts();X.clearRect(0,0,W,H);DrawBg(ts);
  for(var fj=0;fj<FRTS.length;fj++)DrawFr(FRTS[fj],ts);
  DrawPts();DrawSnake(ts);
  if(BOOST){X.save();X.globalAlpha=0.08;X.fillStyle=CC===3?'#ff3300':'#ff7700';X.fillRect(0,0,W,H);X.restore();}
  var bf=document.getElementById('BF');if(bf)bf.style.width=(BENG*100)+'%';
}

function ShowScr(id){
  var all=['sMenu','sChar','sLevels','sLB','sWin','sOver'];
  for(var i=0;i<all.length;i++)document.getElementById(all[i]).className='SCR';
  document.getElementById(id).className='SCR ON';
  document.getElementById('UI').style.display='flex';
}

var CBOX=null;
function MkConf(){if(!CBOX){CBOX=document.createElement('div');CBOX.style='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:55;overflow:hidden;';document.body.appendChild(CBOX);}}
function Confetti(){MkConf();CBOX.innerHTML='';var cols=['#ff6090','#ffd040','#30d878','#38b8f8','#b070ff','#ff5050'];for(var i=0;i<50;i++){var el=document.createElement('div');el.style='position:fixed;border-radius:'+(Math.random()<0.5?'50%':'3px')+';left:'+Math.random()*100+'%;top:-10px;width:'+(Math.random()*11+5)+'px;height:'+(Math.random()*11+5)+'px;background:'+cols[i%cols.length]+';animation:CF '+(1.4+Math.random()*2)+'s '+(Math.random()*0.6)+'s ease-in forwards;';CBOX.appendChild(el);}}
function ClrConf(){if(CBOX)CBOX.innerHTML='';}

function MBg(){if(RUN)return;CAF(MBID);var ts=performance.now();if(X){X.clearRect(0,0,W,H);DrawBg(ts);}MBID=RAF(MBg);}

function StartGame(){InitAudio();ResumeAC();CAF(MBID);MBID=0;CC=G.ch||0;HideUI();ShowHUD();document.getElementById('POV').style.display='none';ClrConf();InitGame();RUN=true;PAU=false;AmbStart(LVS[CL-1].fs);FID=RAF(Loop);}
function DoRestart(){StartGame();}
function NextLevel(){if(CL<50)CL++;StartGame();}

function CheckDaily(){var today=new Date().toDateString();if(G.daily===today)return;G.daily=today;G.streak=(G.streak||0)+1;var amt=G.streak>=7?50:G.streak>=3?20:10;G.coins+=amt;SAV();setTimeout(function(){var ov=document.createElement('div');ov.style='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.78);z-index:80;display:flex;align-items:center;justify-content:center;';ov.innerHTML='<div style="background:rgba(8,22,55,0.97);border:2px solid rgba(255,215,0,0.4);border-radius:22px;padding:22px 24px;text-align:center;max-width:270px;width:88%;"><div style="font-size:48px;margin-bottom:6px;">🎁</div><div class="W" style="font-size:14px;font-weight:800;">Daily Reward!</div><div class="YL" style="font-size:30px;font-weight:900;margin:8px 0;">+'+amt+' 🪙</div><div class="DM SM" style="margin-bottom:14px;">Day '+G.streak+' streak!</div><button class="B BG" style="max-width:160px;" onclick="this.parentNode.parentNode.remove();">Collect!</button></div>';document.body.appendChild(ov);Confetti();},600);}

function OnMove(x,y){if(!RUN||DONE||PAU)return;if(SNK&&SNK[0])TDIR=Math.atan2(y-SNK[0].y,x-SNK[0].x);}
function OnDown(x,y){InitAudio();ResumeAC();PDN=true;OnMove(x,y);}
function OnUp(){PDN=false;}
C.addEventListener('mousemove',function(e){OnMove(e.clientX,e.clientY);});
C.addEventListener('mousedown',function(e){e.preventDefault();OnDown(e.clientX,e.clientY);});
C.addEventListener('mouseup',function(e){e.preventDefault();OnUp();});
C.addEventListener('touchstart',function(e){e.preventDefault();InitAudio();ResumeAC();PDN=true;OnMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
C.addEventListener('touchmove',function(e){e.preventDefault();OnMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
C.addEventListener('touchend',function(e){e.preventDefault();OnUp();},{passive:false});
window.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();PDN=true;}if(e.code==='KeyP'||e.code==='Escape'){if(RUN&&!DONE){PAU?DoResume():DoPause();}}});
window.addEventListener('keyup',function(e){if(e.code==='Space')PDN=false;});

window.onload=function(){TRY(function(){
  Resize();
  if(!X){document.getElementById('sMenu').className='SCR ON';return;}
  GenDeco();CheckDaily();
  document.getElementById('mBest').textContent=G.best;
  document.getElementById('mCoins').textContent=G.coins;
  document.getElementById('mMoney').textContent=G.money;
  document.getElementById('mChar').textContent=CHARS[G.ch||0].e;
  MBg();
});};
</script>
</body>
</html>
